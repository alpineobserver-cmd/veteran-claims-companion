name: Debrief release gate

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma validates the URL while generating its client during npm ci.
      # Release checks do not connect to this fictional local database.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/debrief_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run the Debrief release checks
        run: npm run test:release
