name: Debrief release gate

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/debrief_ci
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check React, Next.js, accessibility, and TypeScript lint rules
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/debrief_ci
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check TypeScript
        run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/debrief_ci
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build the production application
        run: npm run build

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/debrief_ci
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run deterministic unit and evaluation checks
        run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/debrief_ci
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run storage and data-lifecycle integration checks
        run: npm run test:integration

  migration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: debrief_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d debrief_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/debrief_ci
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate the Prisma schema
        run: npm run db:validate
      - name: Apply every migration to an empty PostgreSQL database
        run: npm run db:migrate:deploy
      - name: Confirm the migration history is current
        run: npm run db:migrate:status

  dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/debrief_ci
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate the dependency tree and block high-severity advisories
        run: npm run check:dependencies

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/debrief_ci
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run authentication, authorization, abuse, and legal-boundary checks
        run: npm run test:security

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/debrief_ci
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install isolated Chromium
        run: npx playwright install --with-deps chromium
      - name: Run complete-claim, recovery, and large-workspace browser checks
        run: npm run test:browser

  content-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Require reviewed, recorded authoritative content changes
        env:
          CONTENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || github.sha }}
          CONTENT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CONTENT_REVIEW_REQUIRED: ${{ github.event_name == 'pull_request' }}
          CONTENT_REVIEW_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'content-reviewed') }}
        run: npm run content:governance-check

  verify:
    if: always()
    needs: [lint, typecheck, build, unit, integration, migration, dependencies, security, browser, content-governance]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm every release check passed
        run: |
          test "${{ needs.typecheck.result }}" = "success"
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.build.result }}" = "success"
          test "${{ needs.unit.result }}" = "success"
          test "${{ needs.integration.result }}" = "success"
          test "${{ needs.migration.result }}" = "success"
          test "${{ needs.dependencies.result }}" = "success"
          test "${{ needs.security.result }}" = "success"
          test "${{ needs.browser.result }}" = "success"
          test "${{ needs.content-governance.result }}" = "success"
