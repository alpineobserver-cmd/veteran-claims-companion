name: Official content authority monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "41 10 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  check-authorities:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Check official eCFR, VA, and DoD form authorities
        id: authority-check
        continue-on-error: true
        run: npm run content:authority-check
      - name: Open, update, or resolve the review issue
        uses: actions/github-script@v7
        env:
          CHECK_OUTCOME: ${{ steps.authority-check.outcome }}
        with:
          script: |
            const title = "[Content review] Official authority changed or unavailable";
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: "open", per_page: 100 });
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            if (process.env.CHECK_OUTCOME !== "success") {
              const body = `The read-only authority monitor found a newer eCFR issue date, a changed official form signal, or an unavailable official URL. Review the fixed-field workflow output and the official source before editing Debrief content. Automated publication is prohibited.\n\nWorkflow run: ${runUrl}`;
              if (existing) await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
              else await github.rest.issues.create({ owner, repo, title, body });
              core.setFailed("Official content authority review is required.");
              return;
            }
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: `The authority monitor passed again. Workflow run: ${runUrl}` });
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: "closed", state_reason: "completed" });
            }
